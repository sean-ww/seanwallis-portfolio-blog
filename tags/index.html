    <script>
  function initAllSplides() {
    if (typeof Splide === 'undefined') {
      setTimeout(initAllSplides, 50);
      return;
    }

    document.querySelectorAll('.splide').forEach(function (element, index) {
      if (!element.classList.contains('is-initialized')) {
        const splide = new Splide(element);

        splide.on('mounted', function () {
          
          const offsetDelay = index * 1500; 
          setTimeout(function () {
            splide.Components.Autoplay.play();
          }, offsetDelay);
        });

        splide.mount();
        element.classList.add('is-initialized');

        
        splide.Components?.Autoplay?.pause();
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initAllSplides);
</script>
