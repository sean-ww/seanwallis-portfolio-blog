<div class="post-wrapper">
  <article class="post-entry">
    <section class="post-header">
      <h2 class="post-title"><a href="{{ .Permalink }}" class="post-link">{{ .Title }}</a></h2>
      <p class="post-meta">@{{ if isset .Params "author" }}{{ .Params.author }}{{ else }}{{ .Site.Params.author }}{{ end }} · {{ .Date.Format "Jan 2, 2006" }} · {{ .ReadingTime }} min read</p>
    </section>
    {{ if isset .Params "cover" }}
    <img class="post-cover" src="{{ .Params.cover }}" alt="{{ .Title }}" loading="lazy" decoding="async">
    {{ end }}
    <section class="post-summary">{{ .Summary }}</section>
    <section class="post-footer">
      <a class="read-more" href="{{ .Permalink }}">Read More →</a>
    </section>
  </article>
</div>
